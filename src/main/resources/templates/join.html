<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"

>
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

</head>
<body>
<section class="container">
<form th:action="@{/join}" th:object="${join}" method="post">
    <div class="mb-3">
        <label class="form-label">Name
        <input type="text" class="form-contnrol" th:field="*{name}"></label>
        <p th:if="${#fields.hasErrors('name')}" th:error="${name}" class="text-danger">Name Error</p>
    </div>
    <div class="mb-3">
    <label class="form-label">Email
        <input type="text" class="form-contnrol"  th:field="*{email}"></label>
        <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger">Email Error</p>
    </div>
    <div class="mb-3">
        <label class="form-label">Password
        <input type="text" class="form-contnrol"  th:field="*{password}">
        </label>
        <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger">Password Error</p>
    </div>
    <div class="mb-3">
        <label class="form-label">Confirm Password
        <input type="text" class="form-contnrol"  th:field="*{confirm_password}">
        </label>
        <p th:if="${#fields.hasErrors('confirm_password')}" th:errors="*{confirm_password}" class="text-danger">Confirm_Password Error</p>
    </div>
<button type="submit" class="btn btn-primary">회원가입</button>
<a type="button" th:href="@{/list}" class="btn btn-warning">취소</a>

</form>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="https://www.thymeleaf.org"

>
<head>
    <meta charset="UTF-8">
    <title>LOGIN</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">

</head>
<body>
<section class="container">
    <div class="mb-3 text-danger" th:if="${param.error}">아이디와 패스워드가 잘못 되었습니다</div>
<form action="/login" th:action="@{login}" method="post">
    <div class="mb-3">
        <label class="form-label" >Email
        <input type="email" class="form-contnrol" id="email" name="email"></label>
    </div>
    <div class="mb-3">
    <label class="form-label">Password
        <input type="password" class="form-contnrol" id="password" name="password"></label>
    </div>


<button type="submit" class="btn btn-primary">로그인</button>
</form>
</section>
</body>
</html>
